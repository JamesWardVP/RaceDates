<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>Map — RaceDates</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Racing+Sans+One&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="css/style.css?v=1.1.0">
</head>
<body>

  <div class="container">
    <div class="page-title">
      <h1>UK Motorsport Map</h1>
      <p>Every venue pinned and colour-coded by race type. Switch between track view and race view.</p>
    </div>

    <div class="filter-bar">
      <div class="mode-toggle" role="tablist" aria-label="Map mode">
        <button class="mode-btn active" id="mode-tracks" role="tab" aria-selected="true">Tracks</button>
        <button class="mode-btn" id="mode-races" role="tab" aria-selected="false">Races</button>
      </div>

      <!-- Track mode controls -->
      <span id="track-controls" style="display:contents">
        <input class="filter-input" id="map-search" type="search" placeholder="Search tracks by name or place…" aria-label="Search tracks">
        <span id="map-racetypes" style="display:flex;flex-wrap:wrap;gap:0.4rem"></span>
      </span>

      <!-- Race mode controls -->
      <span id="race-controls" style="display:none">
        <input class="filter-input" id="map-race-search" type="search" placeholder="Search races or series…" aria-label="Search races">
        <select class="filter-select" id="map-race-type" aria-label="Filter by race type"></select>
        <select class="filter-select" id="map-series" aria-label="Filter by series"></select>
      </span>

      <span class="filter-count" id="map-count"></span>
    </div>

    <div id="map" aria-label="Map of UK motorsport venues"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="js/main.js?v=1.1.0"></script>
  <script src="js/map.js?v=1.1.0"></script>
</body>
</html>
