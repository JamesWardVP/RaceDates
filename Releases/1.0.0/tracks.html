<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>Tracks — RaceDates</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Racing+Sans+One&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=1.0.0">
</head>
<body>

  <div class="container">
    <div class="page-title">
      <h1>UK Race Tracks</h1>
      <p>Every circuit, drag strip, hill climb and rallycross venue in the UK.</p>
    </div>

    <div class="filter-bar">
      <input class="filter-input" id="track-search" type="search" placeholder="Search by name or place…" aria-label="Search tracks">
      <select class="filter-select" id="filter-country" aria-label="Filter by location"></select>
      <select class="filter-select" id="filter-venue" aria-label="Filter by track type"></select>
      <span class="filter-label">Races hosted:</span>
      <span id="filter-racetypes" style="display:flex;flex-wrap:wrap;gap:0.4rem"></span>
      <span class="filter-count" id="track-count"></span>
    </div>

    <div class="card-grid" id="track-grid"></div>
  </div>

  <script src="js/main.js?v=1.0.0"></script>
  <script src="js/tracks.js?v=1.0.0"></script>
</body>
</html>
